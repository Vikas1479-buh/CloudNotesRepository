<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/faculty/dashboard">

            <i class="fa-solid fa-user-tie"></i>

            Faculty Portal

        </a>

        <div class="dropdown">

            <button
                class="btn btn-success border-0 dropdown-toggle"
                data-bs-toggle="dropdown">

                <i class="fa-solid fa-circle-user fa-lg"></i>

                {{ current_user.full_name }}

            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow">

                <li>

                    <h6 class="dropdown-header">

                        {{ current_user.role.value }}

                    </h6>

                </li>

                <li>

                    <a
                        class="dropdown-item"
                        href="/faculty/profile">

                        <i class="fa-solid fa-user me-2"></i>

                        My Profile

                    </a>

                </li>

                <li>

                    <hr class="dropdown-divider">

                </li>

                <li>

                    <a
                        class="dropdown-item text-danger"
                        href="{{ url_for('auth.logout') }}">

                        <i class="fa-solid fa-right-from-bracket me-2"></i>

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h4 class="text-center mb-4">

                Faculty Panel

            </h4>

            <ul class="nav flex-column">

                <li class="nav-item mb-2">

                    <a class="nav-link text-white" href="/faculty/dashboard">

                        <i class="fa-solid fa-house me-2"></i>

                        Dashboard

                    </a>

                </li>

                <li class="nav-item mb-2">

                    <a class="nav-link text-white" href="/faculty/upload-note">

                        <i class="fa-solid fa-upload me-2"></i>

                        Upload Notes

                    </a>

                </li>

                <li class="nav-item mb-2">

                    <a class="nav-link text-white" href="/faculty/my-notes">

                        <i class="fa-solid fa-file-lines me-2"></i>

                        My Notes

                    </a>

                </li>

            </ul>

        </div>

        <div class="col-md-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
